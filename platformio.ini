[platformio]
default_envs = esp32-s3-devkitc-1-n16r8
src_dir = main
include_dir = main

[env:esp32-s3-devkitc-1-n16r8]
platform = espressif32  @5.3.0 ;@ 5.4.0 ;@ 5.3.0 ;@ 6.0.0 ; @ 5.3.0 ;6.3.2  ; High enough version for solid S3 N16R8 support
framework = espidf
board = esp32-s3-devkitc-1     
board_build.partitions = partitions.csv

board_upload.flash_size = 16MB
board_build.flash_mode = dio    ; Required for N16 flash speed
board_build.arduino.memory_type = qio_opi ; Octal Flash / Octal PSRAM
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L

build_flags =
    -DUSER_CONFIGURATION=1
    -DCOREXY=1                  ; Matches your machine type
    -DUSB_SERIAL_CDC=1          ; Enables Serial over native USB
    -DWIFI_ENABLE=1
    -DWEBUI_ENABLE=1
    -DHTTP_ENABLE=1
    -DBOARD_HAS_PSRAM
    ; -D CONFIG_SPI_FLASH_ERASE_TOUT_NONBLOCK=1
    ; -D CONFIG_SPI_FLASH_AUTO_SUSPEND=1
    ; -DSDCARD_ENABLE=0           ; Set to 0 if not using, or 2 for SPI
    ; -DLITTLEFS_ENABLE=1
    ; -DN_SPINDLE=1
    ; Use OPI for PSRAM

board_build.esp32_sdkconfig_options =
    CONFIG_SPI_FLASH_ERASE_TOUT_NONBLOCK=y
    CONFIG_SPIRAM_XIP_FROM_PSRAM=y    
    CONFIG_FATFS_IRAM_MEM_ALLOC=y
    CONFIG_VFS_SUPPORT_IO=y


board_build.embed_files =
    main/embedded/favicon.ico
    main/embedded/ap_login.html
    main/embedded/index.html.gz

monitor_speed = 115200
